<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Invitation — Aimbus Aerospace Group</title>
  <meta property="og:title" content="Meeting Invitation — Aimbus Aerospace Group" />
  <meta property="og:description" content="Product Update & Progress Review · 22 April 2026" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0B1C3A;
      --blue: #1565C0;
      --blue-bright: #1976D2;
      --blue-light: #E3F0FF;
      --blue-dim: rgba(21,101,192,0.08);
      --blue-border: rgba(21,101,192,0.2);
      --white: #ffffff;
      --surface: #F4F8FF;
      --muted: #5A7BA8;
      --line: rgba(21,101,192,0.1);
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    html, body {
      min-height: 100%;
      background: #EEF4FF;
      font-family: var(--font);
      color: var(--navy);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      min-height: 100svh;
      position: relative;
      overflow-x: hidden;
    }

    /* ─── background grid ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(21,101,192,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(21,101,192,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── glow blob ─── */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse at center, rgba(21,101,192,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── card ─── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      background: var(--white);
      border: 1px solid rgba(21,101,192,0.15);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(21,101,192,0.08);
      animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── header ─── */
    .card-header {
      padding: 2rem 2rem 1.75rem;
      border-bottom: 1px solid var(--line);
      position: relative;
      overflow: hidden;
      background: var(--navy);
    }

    .card-header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(56,182,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .logo-name {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(56,182,255,0.15);
      border: 1px solid rgba(56,182,255,0.3);
      color: #38B6FF;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 3px 10px 3px 8px;
      border-radius: 20px;
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    .badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #38B6FF;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .card-title {
      font-size: 26px;
      font-weight: 500;
      color: #EEF4FF;
      line-height: 1.25;
      margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
    }

    .card-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      font-weight: 300;
    }

    /* ─── body ─── */
    .card-body {
      padding: 1.75rem 2rem 2rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .info-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0.9rem 1rem;
    }

    .info-item.full { grid-column: 1 / -1; }

    .info-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .info-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--navy);
    }

    .info-value.accent { color: var(--blue-bright); }

    /* ─── divider ─── */
    .divider {
      border: none;
      border-top: 1px solid var(--line);
      margin: 0 0 1.5rem;
    }

    /* ─── join button ─── */
    .join-wrap { position: relative; }

    .join-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid;
      letter-spacing: 0.01em;
    }

    .join-btn.active {
      background: var(--navy);
      color: #ffffff;
      border-color: var(--navy);
    }

    .join-btn.active:hover {
      background: var(--blue-bright);
      border-color: var(--blue-bright);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(21,101,192,0.2);
    }

    .join-btn.locked {
      background: var(--surface);
      color: var(--muted);
      border-color: var(--line);
      cursor: default;
    }

    .note {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
      font-family: var(--mono);
      letter-spacing: 0.03em;
      opacity: 0.7;
    }

    /* ─── footer ─── */
    .card-footer {
      padding: 1rem 2rem;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .footer-text {
      font-size: 11px;
      color: var(--muted);
    }

    .footer-logo {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--blue-bright);
      letter-spacing: 0.1em;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- ── HEADER ── -->
  <div class="card-header">
    <div class="logo-row">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="none" stroke="#38B6FF" stroke-width="1.2"/>
        <polygon points="16,7 23,11 23,21 16,25 9,21 9,11" fill="rgba(56,182,255,0.08)" stroke="#38B6FF" stroke-width="0.6"/>
        <circle cx="16" cy="16" r="2" fill="#38B6FF"/>
        <line x1="16" y1="10" x2="16" y2="14" stroke="#38B6FF" stroke-width="1" stroke-linecap="round"/>
        <line x1="16" y1="18" x2="16" y2="22" stroke="#38B6FF" stroke-width="1" stroke-linecap="round"/>
        <line x1="10.5" y1="13" x2="14" y2="15" stroke="#38B6FF" stroke-width="1" stroke-linecap="round"/>
        <line x1="18" y1="17" x2="21.5" y2="19" stroke="#38B6FF" stroke-width="1" stroke-linecap="round"/>
        <line x1="10.5" y1="19" x2="14" y2="17" stroke="#38B6FF" stroke-width="1" stroke-linecap="round"/>
        <line x1="18" y1="15" x2="21.5" y2="13" stroke="#38B6FF" stroke-width="1" stroke-linecap="round"/>
      </svg>
      <span class="logo-name">Aimbus Aerospace Group</span>
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      Meeting Invitation
    </div>

    <div class="card-title">Product Update &amp;<br>Progress Review</div>
    <div class="card-sub">Q2 2026 · Internal Session</div>
  </div>

  <!-- ── BODY ── -->
  <div class="card-body">
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Date</div>
        <div class="info-value">22 April 2026</div>
      </div>
      <div class="info-item">
        <div class="info-label">Time</div>
        <!-- ✏️ แก้เวลาตรงนี้ -->
        <div class="info-value accent" id="timeDisplay">12:00 – 13:30 ICT (UTC+7, Bangkok)</div>
      </div>
      <div class="info-item">
        <div class="info-label">Platform</div>
        <div class="info-value">Online · Zoom / Meet</div>
      </div>
      <div class="info-item">
        <div class="info-label">Host</div>
        <div class="info-value">Pasit · Aimbus</div>
      </div>
    </div>

    <hr class="divider" />

    <div class="join-wrap">
      <button class="join-btn locked" id="joinBtn" onclick="handleJoin()">
        <!-- icon lock -->
        <svg id="btnIcon" width="15" height="15" viewBox="0 0 14 14" fill="none">
          <rect x="3" y="6" width="8" height="6" rx="1.5" stroke="currentColor" stroke-width="1.1"/>
          <path d="M5 6V4.5a2 2 0 0 1 4 0V6" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
        </svg>
        <span id="joinLabel">Link will be available soon</span>
      </button>
      <div class="note" id="joinNote">ลิงก์จะเปิดใช้งานก่อนการประชุม</div>
    </div>
  </div>

  <!-- ── FOOTER ── -->
  <div class="card-footer">
    <span class="footer-text">For invited participants only</span>
    <span class="footer-logo">AIMBUS · 2026</span>
  </div>

</div>

<script>
  // ════════════════════════════════════════════
  //  ✏️  แก้ 2 ค่านี้ก่อน deploy จริง
  // ════════════════════════════════════════════
  const MEETING_LINK = "https://us06web.zoom.us/j/89092878744?pwd=Mm4YLaBsUHNafuEX5iafbc9YoeDNj4.1";          // ← ใส่ลิงก์ Zoom / Meet ตรงนี้
  const MEETING_TIME = "12:00 – 13:30 ICT (UTC+7, Bangkok)";          // ← เช่น "10:00 – 11:00 (ICT)"
  // ════════════════════════════════════════════

  function init() {
    if (MEETING_TIME) {
      document.getElementById('timeDisplay').textContent = MEETING_TIME;
    }
    if (MEETING_LINK) {
      const btn  = document.getElementById('joinBtn');
      const lbl  = document.getElementById('joinLabel');
      const note = document.getElementById('joinNote');
      const icon = document.getElementById('btnIcon');
      btn.classList.replace('locked', 'active');
      lbl.textContent  = 'Join Meeting';
      note.textContent = 'Click to join the online session';
      icon.innerHTML   = `<path d="M2 7h8M7 4l3 3-3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                          <path d="M10 3v8" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>`;
    }
  }

  function handleJoin() {
    if (MEETING_LINK) window.open(MEETING_LINK, '_blank');
  }

  init();
</script>
</body>
</html>
